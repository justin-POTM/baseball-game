<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚾ MLB 策略模擬：九局經典對抗賽 ⚾</title>
    <style>
        body { background-color: #1a252f; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .game-wrapper { max-width: 850px; margin: 0 auto; background: #2c3e50; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h1 { color: #f1c40f; margin-top: 0; text-shadow: 2px 2px #000; font-size: 28px; }
        
        /* 記分板 */
        .scoreboard { width: 100%; border-collapse: collapse; background: #111; color: #00ff00; font-family: 'Courier New', monospace; font-size: 18px; margin-bottom: 20px; border: 3px solid #7f8c8d; }
        .scoreboard th, .scoreboard td { border: 1px solid #444; padding: 10px; text-align: center; }
        .scoreboard th { background: #222; color: #bdc3c7; }
        .active-inning { color: #fff; background: #c0392b; font-weight: bold; border-radius: 3px; }

        .game-layout { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        
        /* BSO */
        .bso-panel { flex: 1; min-width: 260px; background: #111; border: 3px solid #7f8c8d; border-radius: 10px; padding: 15px; text-align: left; box-sizing: border-box; }
        .bso-row { display: flex; align-items: center; margin-bottom: 12px; font-size: 22px; font-weight: bold; }
        .bso-label { width: 35px; font-family: monospace; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: #333; margin-left: 10px; display: inline-block; border: 1px solid #fff; }
        .dot.ball { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .dot.strike { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .dot.out { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

        /* 球場 */
        .baseball-field { flex: 1.3; min-width: 320px; height: 260px; background: #27ae60; border: 5px solid #1e824c; border-radius: 10px; position: relative; box-sizing: border-box; }
        .diamond { width: 120px; height: 120px; border: 2px dashed #fff; position: absolute; top: 65px; left: 50%; transform: translateX(-50%) rotate(45deg); }
        .base { width: 22px; height: 22px; background: #fff; border: 2px solid #333; position: absolute; transform: rotate(-45deg); transition: background 0.3s; }
        .base.occupied { background: #e74c3c; box-shadow: 0 0 12px #e74c3c; border-color: #fff; }
        #base1 { top: -11px; right: -11px; }
        #base2 { top: -11px; left: -11px; }
        #base3 { bottom: -11px; left: -11px; }
        .home-plate { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: bold; background: #1e824c; padding: 2px 10px; border-radius: 4px; border: 1px solid #fff; }

        /* 操作面板區 */
        .card-container { background: #34495e; padding: 20px; border-radius: 10px; border: 2px solid #455a64; margin-top: 10px; }
        .cards-row { display: flex; justify-content: center; gap: 20px; margin: 15px 0; min-height: 180px; align-items: center; }
        
        /* 投手配球按鈕 */
        .pitch-btn { padding: 20px 40px; font-size: 22px; font-weight: bold; border: 3px solid #fff; border-radius: 10px; cursor: pointer; color: white; transition: transform 0.1s; }
        .pitch-strike { background: #2980b9; }
        .pitch-ball { background: #27ae60; }
        .pitch-btn:active { transform: scale(0.95); }

        /* 打擊蓋牌 */
        .card-slot { width: 110px; height: 160px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; position: relative; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .card-slot.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 8px; border: 4px solid #fff; box-sizing: border-box; font-weight: bold; }
        .card-back { background: linear-gradient(135deg, #d35400 25%, #e67e22 25%, #e67e22 50%, #d35400 50%, #d35400 75%, #e67e22 75%, #e67e22 100%); background-size: 20px 20px; color: #fff; font-size: 36px; text-shadow: 1px 1px 3px #000; }
        .card-front { background: #f1c40f; color: #2c3e50; font-size: 18px; transform: rotateY(180deg); }
        .card-front.bad-card { background: #95a5a6; color: #fff; }
        .card-slot.disabled { pointer-events: none; opacity: 0.6; }

        .game-log { margin-top: 15px; font-size: 18px; color: #f1c40f; min-height: 26px; font-weight: bold; background: #111; padding: 8px; border-radius: 5px; }
        .btn-action { padding: 12px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #e74c3c; color: white; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>⚾ MLB 真實數據與規則模擬賽 ⚾</h1>

        <!-- 記分板 -->
        <table class="scoreboard">
            <thead>
                <tr>
                    <th width="140">球隊</th>
                    <th id="i1">1</th><th id="th-i2">2</th><th id="th-i3">3</th><th id="th-i4">4</th><th id="th-i5">5</th>
                    <th id="th-i6">6</th><th id="th-i7">7</th><th id="th-i8">8</th><th id="th-i9">9</th>
                    <th width="50">R</th><th width="50">H</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="color: #3498db; font-weight: bold;">客隊 (AI)</td>
                    <td id="a1">-</td><td id="a2">-</td><td id="a3">-</td><td id="a4">-</td><td id="a5">-</td>
                    <td id="a6">-</td><td id="a7">-</td><td id="a8">-</td><td id="a9">-</td>
                    <td id="away-R" style="color: #fff;">0</td><td id="away-H" style="color: #fff;">0</td>
                </tr>
                <tr style="background: #151515;">
                    <td style="color: #2ecc71; font-weight: bold;">主隊 (玩家)</td>
                    <td id="h1">-</td><td id="h2">-</td><td id="h3">-</td><td id="h4">-</td><td id="h5">-</td>
                    <td id="h6">-</td><td id="h7">-</td><td id="h8">-</td><td id="h9">-</td>
                    <td id="home-R" style="color: #fff;">0</td><td id="home-H" style="color: #fff;">0</td>
                </tr>
            </tbody>
        </table>

        <div class="game-layout">
            <!-- BSO 面版 -->
            <div class="bso-panel">
                <div id="game-status-text" style="color: #bdc3c7; font-size: 16px; margin-bottom: 12px; text-align: center; font-weight: bold;">開賽準備中...</div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #00ff00;">B</span>
                    <div id="b1" class="dot"></div><div id="b2" class="dot"></div><div id="b3" class="dot"></div>
                </div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #ffcc00;">S</span>
                    <div id="s1" class="dot"></div><div id="s2" class="dot"></div>
                </div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #ff0000;">O</span>
                    <div id="o1" class="dot"></div><div id="o2" class="dot"></div>
                </div>
            </div>

            <!-- 球場壘包 -->
            <div class="baseball-field">
                <div class="diamond">
                    <div id="base1" class="base"></div>
                    <div id="base2" class="base"></div>
                    <div id="base3" class="base"></div>
                </div>
                <div id="field-batter-text" class="home-plate">等待選手</div>
            </div>
        </div>

        <!-- 卡牌 / 投手決策區 -->
        <div class="card-container">
            <div id="turn-title" style="font-size: 18px; font-weight: bold; color: #bdc3c7; margin-bottom: 10px;">請選擇你的戰術：</div>
            
            <div class="cards-row" id="interactive-area">
                <!-- 這邊會被 JS 動態替換成投手按鈕或是三張蓋牌 -->
            </div>
            
            <button id="next-half-btn" class="btn-action" onclick="startNextHalf()">進入下個半局</button>
            <div id="game-log" class="game-log">準備進行第一局比賽！</div>
        </div>
    </div>

    <script>
        // 大聯盟官方打擊結果機率池 (當電腦或玩家揮中好球時觸發)
        function getRandomBattedBallResult() {
            const rand = Math.random() * 100;
            if (rand < 42.0) return "界外球";
            if (rand < 74.0) return "一般出局";    // 接殺/滾地刺殺
            if (rand < 79.0) return "雙殺打";      // 雙殺
            if (rand < 92.5) return "一壘安打";
            if (rand < 97.5) return "二壘安打";
            if (rand < 98.0) return "三壘安打";
            return "全壘打";
        }

        // 玩家進攻時抽牌結果分配 (投手的配球)
        function getRandomAIInboundResult() {
            return Math.random() < 0.46 ? "好球" : "壞球"; // 聯盟平均進壘率約46%
        }

        let gameState = {
            inning: 1,
            isTop: true, // true=上半局玩家投球/AI打, false=下半局玩家抽牌打擊/AI投
            outs: 0, balls: 0, strikes: 0,
            bases: [false, false, false],
            scoreAway: Array(9).fill(null),
            scoreHome: Array(9).fill(null),
            hitsAway: 0, hitsHome: 0,
            gameOver: false
        };

        // 渲染操作區
        function renderControlPanel() {
            const container = document.getElementById('interactive-area');
            container.innerHTML = "";

            if (gameState.gameOver) return;

            if (gameState.isTop) {
                // 玩家防守投球：顯示好壞球選擇按鈕
                document.getElementById('turn-title').innerText = "🔮 你是投手，請決定你要投進好球帶還是引誘壞球：";
                container.innerHTML = `
                    <button class="pitch-btn pitch-strike" onclick="playerPitch('好球')">🔥 投好球</button>
                    <button class="pitch-btn pitch-ball" onclick="playerPitch('壞球')">🟢 投壞球</button>
                `;
            } else {
                // 玩家進攻打擊：顯示三張蓋牌
                document.getElementById('turn-title').innerText = "🔥 輪到你打擊了！請盲選一張蓋牌決定你的命運：";
                for (let i = 0; i < 3; i++) {
                    container.innerHTML += `
                        <div class="card-slot" id="slot${i}" onclick="playerBat(${i})">
                            <div class="card-inner">
                                <div class="card-back">⚾</div>
                                <div class="card-front" id="front${i}">?</div>
                            </div>
                        </div>
                    `;
                }
            }
        }

        function updateUI() {
            // 燈號
            for(let i=1; i<=3; i++) document.getElementById(`b${i}`).className = i <= gameState.balls ? 'dot ball' : 'dot';
            for(let i=1; i<=2; i++) document.getElementById(`s${i}`).className = i <= gameState.strikes ? 'dot strike' : 'dot';
            for(let i=1; i<=2; i++) document.getElementById(`o${i}`).className = i <= gameState.outs ? 'dot out' : 'dot';

            // 壘包
            document.getElementById('base1').className = gameState.bases[0] ? 'base occupied' : 'base';
            document.getElementById('base2').className = gameState.bases[1] ? 'base occupied' : 'base';
            document.getElementById('base3').className = gameState.bases[2] ? 'base occupied' : 'base';

            // 狀態文字
            const halfText = gameState.isTop ? "上半 (玩家防守投球)" : "下半 (玩家進攻打擊)";
            document.getElementById('game-status-text').innerText = `第 ${gameState.inning} 局 ${halfText} • ${gameState.outs} 出局`;
            document.getElementById('field-batter-text').innerText = gameState.isTop ? "AI 打擊中" : "玩家 打擊中";

            // 記分板一格一格更新
            let totalAway = 0, totalHome = 0;
            for(let i=1; i<=9; i++) {
                const aVal = gameState.scoreAway[i-1];
                document.getElementById(`a${i}`).innerText = aVal === null ? '-' : aVal;
                if(aVal !== null) totalAway += aVal;
                
                const hVal = gameState.scoreHome[i-1];
                document.getElementById(`h${i}`).innerText = hVal === null ? '-' : hVal;
                if(hVal !== null) totalHome += hVal;

                document.getElementById(i === 1 ? 'i1' : `th-i2`).parentElement.children[i].className = (i === gameState.inning && !gameState.gameOver) ? 'active-inning' : '';
            }
            
            document.getElementById('away-R').innerText = totalAway;
            document.getElementById('home-R').innerText = totalHome;
            document.getElementById('away-H').innerText = gameState.hitsAway;
            document.getElementById('home-H').innerText = gameState.hitsHome;
        }

        // --- 玩家防守投球邏輯 ---
        function playerPitch(pitchType) {
            let aiSwing = false;
            const rand = Math.random();

            // 依據 MLB 數據統計：好球區揮棒率 65%，壞球追打率 30%
            if (pitchType === "好球") {
                if (rand < 0.65) aiSwing = true;
            } else {
                if (rand < 0.30) aiSwing = true;
            }

            let logMsg = `你投出了一記【${pitchType}】。AI 選擇【${aiSwing ? '揮棒' : '沒有揮棒'}】→ `;
            
            // 規則判定
            if (pitchType === "好球" && !aiSwing) {
                logMsg += "AI 站著不動，這是一記好球！";
                handleStrike();
            } else if (pitchType === "壞球" && !aiSwing) {
                logMsg += "AI 精準選球，這是一記壞球。";
                handleBall();
            } else if (pitchType === "壞球" && aiSwing) {
                logMsg += "🎯 成功引誘！AI 揮到了壞球，記一好球！";
                handleStrike();
            } else if (pitchType === "好球" && aiSwing) {
                // 揮到好球：進入大聯盟擊球隨機池
                const hitResult = getRandomBattedBallResult();
                logMsg += `AI 打到了球！結果是：【${hitResult}】`;
                processBattedBall(hitResult, true);
            }

            document.getElementById('game-log').innerText = logMsg;
            checkInningStatus();
        }

        // --- 玩家進攻打擊邏輯 ---
        function playerBat(selectedIndex) {
            let aiPitches = [getRandomAIInboundResult(), getRandomAIInboundResult(), getRandomAIInboundResult()];
            let selectedPitch = aiPitches[selectedIndex];

            // 翻牌動效展示
            for (let i = 0; i < 3; i++) {
                const front = document.getElementById(`front${i}`);
                front.innerText = aiPitches[i] === "好球" ? "🔥 好球" : "🟢 壞球";
                front.className = aiPitches[i] === "好球" ? "card-front" : "card-front bad-card";
                document.getElementById(`slot${i}`).className += " flipped disabled";
            }

            // 假設玩家點選代表決定「揮棒」
            let logMsg = `你選擇了該卡進行揮棒！AI 投出的是【${selectedPitch}】→ `;

            if (selectedPitch === "壞球") {
                logMsg += "糟糕！你追打了壞球，記一好球！";
                handleStrike();
            } else {
                // 揮到好球：隨機觸發打擊狀況
                const hitResult = getRandomBattedBallResult();
                logMsg += `抓到好球！球被你擊出了：【${hitResult}】`;
                processBattedBall(hitResult, false);
            }

            document.getElementById('game-log').innerText = logMsg;
            
            // 如果還沒出局也沒換局，1.5秒後重置卡牌供下一球使用
            if (gameState.outs < 3 && !gameState.gameOver && document.getElementById('next-half-btn').style.display !== "inline-block") {
                setTimeout(() => {
                    renderControlPanel();
                }, 1600);
            }
            checkInningStatus();
        }

        // 處理好球累積與三振
        function handleStrike() {
            gameState.strikes++;
            if (gameState.strikes >= 3) {
                gameState.outs++;
                document.getElementById('game-log').innerText += gameState.isTop ? " ☠️ 成功三振 AI！" : " ☠️ 你被三振出局！";
                gameState.balls = 0; gameState.strikes = 0;
            }
            updateUI();
        }

        // 處理壞球累積與保送
        function handleBall() {
            gameState.balls++;
            if (gameState.balls >= 4) {
                document.getElementById('game-log').innerText += " 🚶 四壞球保送上壘！";
                let runs = 0;
                if (gameState.bases[0] && gameState.bases[1] && gameState.bases[2]) { runs = 1; }
                else if (gameState.bases[0] && gameState.bases[1]) { gameState.bases[2] = true; }
                else if (gameState.bases[0]) { gameState.bases[1] = true; }
                gameState.bases[0] = true;

                if (runs > 0) {
                    if (gameState.isTop) gameState.scoreAway[gameState.inning-1] += runs;
                    else gameState.scoreHome[gameState.inning-1] += runs;
                }
                gameState.balls = 0; gameState.strikes = 0;
            }
            updateUI();
        }

        // 處理擊出球之後的進階棒球邏輯
        function processBattedBall(result, isAICheck) {
            let runs = 0;
            
            if (gameState.isTop && gameState.scoreAway[gameState.inning-1] === null) gameState.scoreAway[gameState.inning-1] = 0;
            if (!gameState.isTop && gameState.scoreHome[gameState.inning-1] === null) gameState.scoreHome[gameState.inning-1] = 0;

            if (result === "界外球") {
                // 正常棒球規則：兩好球後界外球不計好球數
                if (gameState.strikes < 2) {
                    gameState.strikes++;
                }
            } else if (result === "一般出局") {
                gameState.outs++;
                gameState.balls = 0; gameState.strikes = 0;
            } else if (result === "雙殺打") {
                gameState.outs++;
                // 如果一壘有人，則多追加一個出局數（雙殺）
                if (gameState.bases[0] && gameState.outs < 3) {
                    gameState.outs++;
                    gameState.bases[0] = false;
                    document.getElementById('game-log').innerText += " (⚡ 精彩防守，完成雙殺！)";
                }
                gameState.balls = 0; gameState.strikes = 0;
            } else if (result === "全壘打") {
                runs = (gameState.bases[0]?1:0) + (gameState.bases[1]?1:0) + (gameState.bases[2]?1:0) + 1;
                gameState.bases = [false, false, false];
                if(isAICheck) gameState.hitsAway++; else gameState.hitsHome++;
                gameState.balls = 0; gameState.strikes = 0;
            } else {
                // 安打 (一、二、三壘安打)
                let numBases = 1;
                if(result === "二壘安打") numBases = 2;
                if(result === "三壘安打") numBases = 3;

                if(isAICheck) gameState.hitsAway++; else gameState.hitsHome++;

                // 跑壘推動
                for (let b = 0; b < numBases; b++) {
                    if (gameState.bases[2]) { runs++; gameState.bases[2] = false; }
                    if (gameState.bases[1]) { gameState.bases[2] = true; gameState.bases[1] = false; }
                    if (gameState.bases[0]) { gameState.bases[1] = true; gameState.bases[0] = false; }
                    if (b === 0) { gameState.bases[numBases-1] = true; }
                }
                gameState.balls = 0; gameState.strikes = 0;
            }

            // 加分結算
            if (runs > 0) {
                if (isAICheck) {
                    gameState.scoreAway[gameState.inning-1] += runs;
                } else {
                    gameState.scoreHome[gameState.inning-1] += runs;
                }
            }
            updateUI();
        }

        // 檢查是否達3人出局需換局
        function checkInningStatus() {
            if (gameState.outs >= 3) {
                // 關閉操作區，強制要求點擊按鈕換局
                document.getElementById('interactive-area').innerHTML = "";
                document.getElementById('next-half-btn').style.display = "inline-block";
                document.getElementById('next-half-btn').innerText = gameState.isTop ? "三人出局！換玩家進攻打擊" : "三人出局！進入下一局";
            }
        }

        function startNextHalf() {
            document.getElementById('next-half-btn').style.display = "none";
            gameState.bases = [false, false, false];
            gameState.outs = 0; gameState.balls = 0; gameState.strikes = 0;

            if (gameState.isTop) {
                gameState.isTop = false;
                gameState.scoreHome[gameState.inning-1] = 0;
                document.getElementById('game-log').innerText = `第 ${gameState.inning} 局下半開始！換你上場打擊。`;
            } else {
                if (gameState.inning >= 9) {
                    endGame();
                    return;
                } else {
                    gameState.inning++;
                    gameState.isTop = true;
                    gameState.scoreAway[gameState.inning-1] = 0;
                    document.getElementById('game-log').innerText = `進入第 ${gameState.inning} 局上半！換你防守配球。`;
                }
            }
            renderControlPanel();
            updateUI();
        }

        function endGame() {
            gameState.gameOver = true;
            updateUI();
            
            let totalAway = gameState.scoreAway.reduce((a, b) => (a||0) + (b||0), 0);
            let totalHome = gameState.scoreHome.reduce((a, b) => (a||0) + (b||0), 0);
            
            let finalMsg = "";
            if (totalHome > totalAway) {
                finalMsg = `🏁 終場結束！玩家以 ${totalHome} 比 ${totalAway} 擊敗大聯盟 AI 贏得胜利！🏆`;
            } else if (totalAway > totalHome) {
                finalMsg = `🏁 終場結束！AI 以 ${totalAway} 比 ${totalHome} 險勝，再接再厲！😭`;
            } else {
                finalMsg = `🏁 延長戰成平手 (${totalHome}-${totalAway})，精采絕倫的比赛！🤝`;
            }
            
            document.getElementById('game-log').innerText = finalMsg;
            document.getElementById('turn-title').innerText = "🏁 比賽正式結算結束";
            document.getElementById('interactive-area').innerHTML = "";
        }

        function initGame() {
            gameState.scoreAway[0] = 0;
            renderControlPanel();
            updateUI();
        }

        initGame();
    </script>
</body>
</html>
