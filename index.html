<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚾ Baseball Battle ⚾</title>
<style>
        /* ==========================================
           1. 電腦版預設樣式（維持你原本的精緻設定，並固定記分板）
           ========================================== */
        body { background-color: #1a252f; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .game-wrapper { max-width: 850px; margin: 0 auto; background: #2c3e50; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h1 { color: #f1c40f; margin-top: 0; text-shadow: 2px 2px #000; font-size: 28px; }
        
        /* 💡 修正電腦版記分板不固定：在外殼強行鎖定 100% 寬度與表格佈局 */
        .table-container {
            width: 100% !important;
            max-width: 100% !important;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 20px;
            border-radius: 5px;
            display: block;
        }

        /* 💡 修正：強迫表格填滿寬度，並採取固定算法 (fixed)，格子才不會隨分數多寡而扭曲變形 */
        .scoreboard { 
            width: 100% !important; 
            table-layout: fixed !important; 
            border-collapse: collapse; 
            background: #111; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            font-size: 18px; 
            border: 3px solid #7f8c8d; 
        }
        .scoreboard th, .scoreboard td { border: 1px solid #444; padding: 10px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .scoreboard th { background: #222; color: #bdc3c7; }
        .active-inning { color: #fff; background: #c0392b; font-weight: bold; border-radius: 3px; }

        /* 核心左右並排佈局 */
        .game-layout { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        
        /* BSO 燈號 */
        .bso-panel { flex: 1; min-width: 260px; background: #111; border: 3px solid #7f8c8d; border-radius: 10px; padding: 15px; text-align: left; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        .bso-row { display: flex; align-items: center; margin-bottom: 12px; font-size: 22px; font-weight: bold; }
        .bso-label { width: 35px; font-family: monospace; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: #333; margin-left: 10px; display: inline-block; border: 1px solid #fff; }
        .dot.ball { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .dot.strike { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .dot.out { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

        /* 動畫球場 Canvas */
        .stadium-container { flex: 1.3; min-width: 340px; background: #16a085; border: 5px solid #111; border-radius: 10px; position: relative; padding: 0; box-sizing: border-box; overflow: hidden; height: 300px;}
        canvas { background-color: #27ae60; display: block; margin: 0 auto; max-width: 100%; height: auto; }

        /* 操作面板區與卡牌：電腦版維持原本並排 */
        .card-container { background: #34495e; padding: 20px; border-radius: 10px; border: 2px solid #455a64; margin-top: 10px; min-height: 220px;}
        .cards-row { display: flex !important; flex-direction: row !important; justify-content: center; gap: 20px; margin: 15px 0; min-height: 140px; align-items: center; }
        
        /* 決策按鈕 */
        .action-btn { padding: 20px 40px; font-size: 22px; font-weight: bold; border: 3px solid #fff; border-radius: 10px; cursor: pointer; color: white; transition: transform 0.1s; box-shadow: 0 5px #000; }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 2px #000; }
        
        /* 按鈕顏色 */
        .pitch-strike { background: #2980b9; }
        .pitch-ball { background: #27ae60; }
        .bat-swing { background: #e74c3c; }
        .bat-take { background: #f39c12; }

        /* 打擊成果蓋牌樣式 */
        .result-card-slot { width: 105px; height: 145px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; text-align: center; transition: transform 0.5s; transform-style: preserve-3d; position: relative; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .result-card-slot.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; border: 3px solid #fff; box-sizing: border-box; font-weight: bold; }
        .card-back { background: radial-gradient(circle, #2c3e50 20%, #1a252f 100%); color: #f1c40f; font-size: 32px; border-color: #f1c40f; }
        .card-front { background: #f1c40f; color: #2c3e50; font-size: 16px; transform: rotateY(180deg); padding: 5px; }
        
        .card-front.hit-safe { background: #2ecc71; color: #fff; }
        .card-front.hit-out { background: #e74c3c; color: #fff; }
        .card-front.hit-foul { background: #95a5a6; color: #fff; }

        .game-log { margin-top: 15px; font-size: 18px; color: #f1c40f; min-height: 26px; font-weight: bold; background: #111; padding: 12px; border-radius: 5px; line-height: 1.5; text-align: left; }
        .btn-action { padding: 12px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; margin-top: 10px; display: none; }
        #next-half-btn { background: #e74c3c; }
        #restart-game-btn { background: #2980b9; }
        .disabled-zone { pointer-events: none; opacity: 0.5; }

/* ==========================================
           2. 📱 行動裝置專屬樣式（強制按鈕左右並排）
           ========================================== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .game-wrapper { padding: 10px; border-radius: 8px; }
            h1 { font-size: 22px; }
            
            /* 行動端核心區塊上下堆疊 */
            .game-layout { flex-direction: column !important; gap: 15px; }
            .bso-panel, .stadium-container { width: 100% !important; min-width: 100% !important; box-sizing: border-box; }
            .stadium-container { height: 260px; }
            
            /* 🚀 絕招一：強迫按鈕外層容器變成 Flex 橫向排隊 */
            #interactive-area, .cards-row { 
                display: flex !important; 
                flex-direction: row !important; /* 確保一定是左右 */
                justify-content: space-between !important; 
                gap: 10px !important; 
                flex-wrap: nowrap !important; /* 絕對禁止換行 */
                width: 100% !important;
                box-sizing: border-box !important;
            }
            
            /* 🚀 絕招二：強迫按鈕不當 block，並塞入寬度各 50% 鎖死左右 */
            #interactive-area .action-btn, .cards-row .action-btn { 
                display: block !important; /* 或是 inline-block，但在 flex 容器下它會遵守 flex 分配 */
                flex: 1 !important;        /* 兩顆按鈕均分剩餘空間 */
                width: 48% !important;     /* 預留一點 gap 的扣打 */
                max-width: 50% !important; 
                padding: 15px 0 !important; 
                font-size: 18px !important; 
                box-sizing: border-box !important;
                margin: 0 !important;      /* 消除可能被 JS 加上導致爆行的 margin */
            }
            
            /* 打擊成果蓋牌卡片如果是放在 row 裡面，在手機上縮小尺寸 */
            #interactive-area .result-card-slot, .cards-row .result-card-slot {
                flex: none !important;
                width: 75px !important; 
                height: 105px !important;
            }
            .card-back { font-size: 22px !important; }
            .card-front { font-size: 13px !important; }

            .btn-action { width: 100% !important; box-sizing: border-box; }
        }
    </style>
</head>
<body>
<audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    <div class="game-wrapper">
        <h1>⚾ Baseball Battle ⚾</h1>

<div class="table-container">
    <table class="scoreboard">
        <thead>
            <tr>
                <th width="140">球隊</th>
                <th id="i1">1</th><th id="th-i2">2</th><th id="th-i3">3</th><th id="th-i4">4</th><th id="th-i5">5</th>
                <th id="th-i6">6</th><th id="th-i7">7</th><th id="th-i8">8</th><th id="th-i9">9</th>

                <td id="a6">-</td><td id="a7">-</td><td id="a8">-</td><td id="a9">-</td>

                <td id="h6">-</td><td id="h7">-</td><td id="h8">-</td><td id="h9">-</td>
                <td id="h10">-</td><td id="h11">-</td><td id="h12">-</td>
                <td id="home-R" style="color: #fff;">0</td><td id="home-H" style="color: #fff;">0</td>

    </table>
</div>

        <div class="game-layout">
            <div class="bso-panel">
                <div id="game-status-text" style="color: #bdc3c7; font-size: 16px; margin-bottom: 12px; text-align: center; font-weight: bold;">開賽準備中...</div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #00ff00;">B</span>
                    <div id="b1" class="dot"></div><div id="b2" class="dot"></div><div id="b3" class="dot"></div>
                </div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #ffcc00;">S</span>
                    <div id="s1" class="dot"></div><div id="s2" class="dot"></div>
                </div>
                <div class="bso-row">
                    <span class="bso-label" style="color: #ff0000;">O</span>
                    <div id="o1" class="dot"></div><div id="o2" class="dot"></div>
                </div>
            </div>

            <div class="stadium-container">
                <canvas id="fieldCanvas" width="360" height="300"></canvas>
            </div>
        </div>

        <div class="card-container">
            <div id="turn-title" style="font-size: 18px; font-weight: bold; color: #bdc3c7; margin-bottom: 10px;">戰術板</div>
            
            <div class="cards-row" id="interactive-area">
                </div>
            
            <button id="next-half-btn" class="btn-action" onclick="startNextHalf()">進入下個半局</button>
            <button id="restart-game-btn" class="btn-action" onclick="resetWholeGame()">🔄 開始下一場比賽</button>
            <div id="game-log" class="game-log">點擊按鈕開始第一局！</div>
        </div>
    </div>

    <script>
        // 💡 播放背景音樂的函式
function playBGM() {
    let myAudio = document.getElementById("bgm");
    // 設定音量不要太大聲，不然會蓋過語音 (0.0 到 1.0)
    myAudio.volume = 0.2; 
    
    // 嘗試播放，若被瀏覽器攔截則捕獲錯誤
    myAudio.play().catch(function(error) {
        console.log("瀏覽器擋下自動播放，需要玩家點擊互動後才能播放音樂");
    });
}

function playBaseballManVoice(text) {
    let url = "";
    let t = text.trim();
    let speakText = "";

    // 🔍 1. 先判定要把中文用詞轉換成什麼「英文語音」
    if (t === "Strike!" || t === "好球") {
        speakText = "Strike!";
    } else if (t === "Ball!" || t === "壞球") {
        speakText = "Ball!";
    } else if (t === "全壘打") {
        speakText = "Home run!";
    } else if (t === "一壘安打" || t === "二壘安打" || t === "三壘安打" || t.includes("安打")) {
        speakText = "Base hit!";
    } else if (t === "界外球") {
        speakText = "Foul ball!";
    } else if (
        t === "滾地球出局" || 
        t === "高飛球接殺" || 
        t === "平飛球接殺" || 
        t === "雙殺打" || 
        t.includes("出局") || 
        t.includes("接殺") || 
        t === "Out!"
    ) {
        speakText = "Out!";
    }

    // 🔍 2. 如果有要說的英文，就直接呼叫「大廠官方雲端男聲 API」
    if (speakText) {
        // 使用 Google 翻譯官方的 TTS 接口，強制使用美式英文 (en-US)
        // 為了讓它聽起來像男生，我們後面可以放一個專屬的音軌轉換，或者是利用微軟的公共服務：
        const encodedText = encodeURIComponent(speakText);
        
        // ⚡ 這是微軟跟 Google 官方維護的雲端發聲直連，發音非常標準、穩定、絕對不會 404
        url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q=${encodedText}`;
    }

    // 🔍 3. 執行播放
    if (url) {
        let audio = new Audio(url);
        audio.volume = 1.0;
        
        // 部分瀏覽器對 Google TTS 的速度有些敏感，稍微調整播放速度 (0.95 聽起來更低沉、更有磁性)
        audio.defaultPlaybackRate = 0.95; 
        
        audio.play().catch(e => {
            console.log("播放失敗，瀏覽器需要玩家先點擊畫面互動才能播音效：", e);
        });
    }
}
        
        // --- Canvas 與核心幾何配置（45度完美對稱 1/4 圓結構） ---
        const canvas = document.getElementById("fieldCanvas");
        const ctx = canvas.getContext("2d");

        // 本壘設為中心原點 (180, 275)
        const loc = {
            home:  { x: 180, y: 275 },
            pitcher:{ x: 180, y: 195 },
            // 嚴格依照 45 度角計算的內野鑽石幾何 (邊長約 56 像素)
            base1: { x: 220, y: 235 }, 
            base2: { x: 180, y: 195 }, // 二壘位置與投手丘重疊或略往後，此處維持數值穩定
            base3: { x: 140, y: 235 }  
        };
        
        // 為了讓內野視覺比例更完美，微調二壘與投手丘深度
        loc.base2 = { x: 180, y: 195 };
        loc.pitcher = { x: 180, y: 230 };

        let ball = { x: loc.pitcher.x, y: loc.pitcher.y, vx: 0, vy: 0, active: false, radius: 5 };
        let gameState = {};

        function initGameStateObject() {
            gameState = {
                inning: 1, isTop: true,
                outs: 0, balls: 0, strikes: 0,
                bases: [false, false, false], 
                scoreAway: Array(12).fill(null), scoreHome: Array(12).fill(null),
                hitsAway: 0, hitsHome: 0, gameOver: false,
                abAway: 0, abHome: 0,
                stats: {
                    away: { double: 0, triple: 0, hr: 0 },
                    home: { double: 0, triple: 0, hr: 0 }
                }
            };
            gameState.scoreAway[0] = 0; 
        }

        let currentInPlayOptions = [];
        let forcedTargetIndex = 0; 
        let animId;

        // 打擊軌跡落點更新
        const cardTypes = {
            foul: { type: "界外球", target: { x: 40, y: 220 }, style: "hit-foul" },
            gOut: { type: "滾地球出局", target: { x: 200, y: 220 }, style: "hit-out" },
            fOut: { type: "高飛球接殺", target: { x: 130, y: 140 }, style: "hit-out" },
            lOut: { type: "平飛球接殺", target: { x: 220, y: 180 }, style: "hit-out" },
            dPlay: { type: "雙殺打", target: { x: 180, y: 210 }, style: "hit-out" },
            h1: { type: "一壘安打", target: { x: 240, y: 160 }, style: "hit-safe" },
            h2: { type: "二壘安打", target: { x: 210, y: 100 }, style: "hit-safe" },
            h3: { type: "三壘安打", target: { x: 150, y: 100 }, style: "hit-safe" }, 
            hr: { type: "全壘打", target: { x: 180, y: 30 }, style: "hit-safe" }
        };

        function getRandomMLBResult() {
            const rand = Math.random() * 100;
            if (rand < 32.0) return cardTypes.foul;   
            if (rand < 48.0) return cardTypes.gOut;   
            if (rand < 62.0) return cardTypes.fOut;   
            if (rand < 66.0) return cardTypes.lOut;   
            if (rand < 69.0) return cardTypes.dPlay;  
            if (rand < 88.0) return cardTypes.h1;     
            if (rand < 95.0) return cardTypes.h2;     
            if (rand < 97.0) return cardTypes.h3;     
            return cardTypes.hr;                      
        }

        function generateBalancedThreeCards() {
            const finalOutcome = getRandomMLBResult();
            let cardA = finalOutcome;
            let cardB, cardC;

            const isOut = (c) => ["滾地球出局", "高飛球接殺", "平飛球接殺", "雙殺打"].includes(c.type);

            if (isOut(cardA)) {
                cardB = cardTypes.foul;
                const hitPool = [cardTypes.h1, cardTypes.h2, cardTypes.h3, cardTypes.hr];
                cardC = hitPool[Math.floor(Math.random() * hitPool.length)];
            } else if (cardA.type === "界外球") {
                cardB = cardTypes.gOut;
                cardC = cardTypes.h1;
            } else {
                cardB = cardTypes.fOut;
                cardC = cardTypes.foul;
            }

            let cards = [cardA, cardB, cardC];
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }

            forcedTargetIndex = cards.findIndex(c => c.type === finalOutcome.type);
            return cards;
        }

        function getRandomAIInboundResult() {
            return Math.random() < 0.46 ? "好球" : "壞球";
        }

        // --- Canvas 繪圖渲染引擎（1/4完美扇形 + 邊線精準切過一三壘） ---
        function drawField() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 預設全界外區背景（深綠色）
            ctx.fillStyle = "#16a085";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const radius = 250; // 全壘打牆半徑
            
            // 1. 繪製 1/4 圓的界內球場（淺綠色草皮）
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(loc.home.x, loc.home.y);
            // HTML5 Arc 弧度定義：正右方為 0，順時針計算。
            // 完美 1/4 圓對稱向上延伸，左邊線為 225度(1.25*PI)，右邊線為 315度(1.75*PI)
            ctx.arc(loc.home.x, loc.home.y, radius, Math.PI * 1.25, Math.PI * 1.75, false);
            ctx.closePath();
            ctx.fillStyle = "#27ae60"; 
            ctx.fill();
            
            // 全壘打牆圍欄
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.restore();

            // 2. 繪製左右兩側白邊線（從本壘出發，精準切過一三壘包外側並延伸至全壘打牆）
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#ffffff";
            
            // 左邊線 (三壘線)
            const leftEndX = loc.home.x + radius * Math.cos(Math.PI * 1.25);
            const leftEndY = loc.home.y + radius * Math.sin(Math.PI * 1.25);
            ctx.moveTo(loc.home.x, loc.home.y);
            ctx.lineTo(leftEndX, leftEndY);
            
            // 右邊線 (一壘線)
            const rightEndX = loc.home.x + radius * Math.cos(Math.PI * 1.75);
            const rightEndY = loc.home.y + radius * Math.sin(Math.PI * 1.75);
            ctx.moveTo(loc.home.x, loc.home.y);
            ctx.lineTo(rightEndX, rightEndY);
            ctx.stroke();

            // 3. 內野扇形紅土區
            ctx.beginPath();
            ctx.moveTo(loc.home.x, loc.home.y);
            ctx.lineTo(loc.base3.x, loc.base3.y);
            ctx.lineTo(loc.base2.x, loc.base2.y);
            ctx.lineTo(loc.base1.x, loc.base1.y);
            ctx.closePath();
            ctx.fillStyle = "#cd7f32";
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 1;
            ctx.stroke();

            // 4. 繪製壘包（置於 45 度幾何線上）
            const drawBaseSquare = (pos, occupied) => {
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(45 * Math.PI / 180);
                ctx.fillStyle = occupied ? "#ff3f34" : "#ffffff";
                ctx.fillRect(-6, -6, 12, 12);
                ctx.strokeStyle = "#111";
                ctx.lineWidth = 1;
                ctx.strokeRect(-6, -6, 12, 12);
                ctx.restore();
            };
            drawBaseSquare(loc.base1, gameState.bases[0]);
            drawBaseSquare(loc.base2, gameState.bases[1]);
            drawBaseSquare(loc.base3, gameState.bases[2]);
            
            // 5. 本壘板
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.moveTo(loc.home.x, loc.home.y - 5);
            ctx.lineTo(loc.home.x + 6, loc.home.y);
            ctx.lineTo(loc.home.x + 6, loc.home.y + 6);
            ctx.lineTo(loc.home.x - 6, loc.home.y + 6);
            ctx.lineTo(loc.home.x - 6, loc.home.y);
            ctx.closePath();
            ctx.fill();

            // 6. 投手丘
            ctx.beginPath();
            ctx.arc(loc.pitcher.x, loc.pitcher.y, 6, 0, Math.PI*2);
            ctx.fillStyle = "#cd7f32";
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.stroke();

            // 7. 飛球動態渲染
            if (ball.active) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
                ctx.fillStyle = "#ffffff";
                ctx.fill();
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function animateBall(startX, startY, endX, endY, speed, callback) {
            ball.x = startX;
            ball.y = startY;
            ball.active = true;
            const dx = endX - startX;
            const dy = endY - startY;
            const distance = Math.sqrt(dx*dx + dy*dy);
            ball.vx = (dx / distance) * speed;
            ball.vy = (dy / distance) * speed;

            function step() {
                ball.x += ball.vx;
                ball.y += ball.vy;
                const currDx = endX - ball.x;
                const currDy = endY - ball.y;
                const currDist = Math.sqrt(currDx*currDx + currDy*currDy);
                drawField();

                if (currDist < speed || (ball.vy > 0 && ball.y >= endY) || (ball.vy < 0 && ball.y <= endY)) {
                    ball.active = false;
                    drawField();
                    cancelAnimationFrame(animId);
                    if(callback) callback();
                } else {
                    animId = requestAnimationFrame(step);
                }
            }
            step();
        }

function updateUI() {
            for(let i=1; i<=3; i++) {
                const bElem = document.getElementById(`b${i}`);
                if (bElem) bElem.className = i <= gameState.balls ? 'dot ball' : 'dot';
            }
            for(let i=1; i<=2; i++) {
                const sElem = document.getElementById(`s${i}`);
                if (sElem) sElem.className = i <= gameState.strikes ? 'dot strike' : 'dot';
                
                const oElem = document.getElementById(`o${i}`);
                if (oElem) oElem.className = i <= gameState.outs ? 'dot out' : 'dot';
            }

            const halfText = gameState.isTop ? "上半 (玩家防守投球)" : "下半 (玩家進攻打擊)";
            document.getElementById('game-status-text').innerText = gameState.gameOver ? "比賽結束" : `第 ${gameState.inning} 局 ${halfText} • ${gameState.outs} 出局`;

            let totalAway = 0, totalHome = 0;
            // 支援延長賽 1~12 局的記分板更新
            for(let i=1; i<=12; i++) {
                const aElem = document.getElementById(`a${i}`);
                const hElem = document.getElementById(`h${i}`);
                
                if (aElem) {
                    const aVal = gameState.scoreAway[i-1];
                    aElem.innerText = aVal === null ? '-' : aVal;
                    if(aVal !== null) totalAway += aVal;
                }
                
                if (hElem) {
                    const hVal = gameState.scoreHome[i-1];
                    
                    // 如果這局觸發了再見勝利 (gameState.isWalkOff)，分數後面補上 "X"
                    if (hVal !== null && i === gameState.inning && gameState.isWalkOff) {
                        hElem.innerText = hVal + "X";
                    } else {
                        hElem.innerText = hVal === null ? '-' : hVal;
                    }
                    if(hVal !== null) totalHome += hVal;
                }

                const thElem = document.getElementById(i === 1 ? 'i1' : `th-i${i}`)?.parentElement?.children[i];
                if (thElem) thElem.className = (i === gameState.inning && !gameState.gameOver) ? 'active-inning' : '';
            }
            
            document.getElementById('away-R').innerText = totalAway;
            document.getElementById('home-R').innerText = totalHome;
            document.getElementById('away-H').innerText = gameState.hitsAway;
            document.getElementById('home-H').innerText = gameState.hitsHome;

            // 💡 修正：已對齊你實際的按鈕 ID 'next-half-btn'
            const nextBtn = document.getElementById('next-half-btn'); 
            if (nextBtn) {
                if (gameState.outs >= 3 || gameState.gameOver || gameState.isWalkOff) {
                    // 判斷是否滿足比賽結束條件
                    const cond9TopWin = (gameState.inning === 9 && gameState.isTop && totalHome > totalAway);
                    const cond9BottomEnd = (gameState.inning >= 9 && !gameState.isTop && totalHome !== totalAway);
                    const cond12End = (gameState.inning === 12 && !gameState.isTop);
                    
                    if (cond9TopWin || cond9BottomEnd || cond12End || gameState.gameOver || gameState.isWalkOff) {
                        nextBtn.innerText = "🏁 比賽結束看結果";
                        nextBtn.style.backgroundColor = "#e74c3c"; // 變成紅色醒目按鈕
                    } else {
                        nextBtn.innerText = "👉 進入下個半局";
                        nextBtn.style.backgroundColor = ""; // 恢復原本顏色
                    }
                } else {
                    nextBtn.innerText = "👉 進入下個半局";
                    nextBtn.style.backgroundColor = "";
                }
            }
        }
        
        function handleStrike() {
            gameState.strikes++;
            if (gameState.strikes >= 3) {
                gameState.outs++;
                document.getElementById('game-log').innerText += " ☠️ 遭到三振出局！";
                if(!gameState.isTop) gameState.abHome++; 
                else gameState.abAway++;
                gameState.balls = 0; gameState.strikes = 0;
            }
            updateUI();
        }

        function handleBall() {
            gameState.balls++;
            if (gameState.balls >= 4) {
                document.getElementById('game-log').innerText += " 🚶 四壞球保送！";
                let runs = 0;
                if (gameState.bases[0] && gameState.bases[1] && gameState.bases[2]) { runs = 1; } 
                else if (gameState.bases[0] && gameState.bases[1]) { gameState.bases[2] = true; } 
                else if (gameState.bases[0]) { gameState.bases[1] = true; }
                gameState.bases[0] = true;

                if (runs > 0) {
                    if (gameState.isTop) gameState.scoreAway[gameState.inning-1] += runs;
                    else gameState.scoreHome[gameState.inning-1] += runs;
                }
                gameState.balls = 0; gameState.strikes = 0;
            }
            updateUI();
        }

function processBattedBall(result, isAICheck) {
    let runs = 0;
    if (gameState.isTop && gameState.scoreAway[gameState.inning-1] === null) gameState.scoreAway[gameState.inning-1] = 0;
    if (!gameState.isTop && gameState.scoreHome[gameState.inning-1] === null) gameState.scoreHome[gameState.inning-1] = 0;

    const currentStats = isAICheck ? gameState.stats.away : gameState.stats.home;

    // == 1. 界外球 ==
    if (result === "界外球") {
        if (gameState.strikes < 2) gameState.strikes++;
        drawField();
        updateUI();
        return; // 直接結束，絕不上壘
    } 
    
    // == 2. 普通出局 ==
    if (result === "滾地球出局" || result === "高飛球接殺" || result === "平飛球接殺") {
        gameState.outs++;
        if(isAICheck) gameState.abAway++; else gameState.abHome++; 
        gameState.balls = 0; gameState.strikes = 0;
        drawField();
        updateUI();
        return; // 關鍵：出局直接結束，絕對不走下面的安打上壘邏輯
    } 
    
    // == 3. 雙殺打 ==
    if (result === "雙殺打") {
        gameState.outs++; 
        if(isAICheck) { gameState.abAway++; } else { gameState.abHome++; }

        const has1B = gameState.bases[0];
        const has2B = gameState.bases[1];
        const has3B = gameState.bases[2];

        if (gameState.outs < 3) {
            if (has1B && has2B && has3B) {
                gameState.outs++; gameState.bases = [false, true, true];
                document.getElementById('game-log').innerText += " (⚡ 雙殺打！封殺本壘跑者與打者，二三壘有人！)";
            } else if (has1B && has2B && !has3B) {
                gameState.outs++; gameState.bases = [false, false, true];
                document.getElementById('game-log').innerText += " (⚡ 雙殺打！封殺二壘跑者與打者，三壘有人！)";
            } else if (has1B && !has2B && has3B) {
                gameState.outs++; gameState.bases = [false, true, false];
                document.getElementById('game-log').innerText += " (⚡ 雙殺打！封殺本壘跑者與打者，二壘有人！)";
            } else if (!has1B && has2B && has3B) {
                gameState.outs++; gameState.bases = [false, false, true];
                document.getElementById('game-log').innerText += " (⚡ 雙殺打！封殺本壘跑者與打者，二壘跑者上三壘！)";
            } else if (has1B && !has2B && !has3B) {
                gameState.outs++; gameState.bases = [false, false, false];
                document.getElementById('game-log').innerText += " (⚡ 雙殺打！封殺一壘跑者與打者，壘包全空！)";
            } else if (!has1B && has2B && !has3B) {
                gameState.outs++; gameState.bases = [false, false, false];
                document.getElementById('game-log').innerText += " (⚡ 雙殺打！封殺二壘跑者與打者，壘包全空！)";
            } else if (!has1B && !has2B && has3B) {
                gameState.outs++; gameState.bases = [false, false, false];
                document.getElementById('game-log').innerText += " (⚡ 雙殺打！封殺三壘跑者與打者，壘包全空！)";
            } else {
                document.getElementById('game-log').innerText += " (內野滾地球，打者出局。)";
            }
        } else {
            document.getElementById('game-log').innerText += " (內野滾地球，打者出局，三人出局！)";
        }
        gameState.balls = 0; gameState.strikes = 0;
        drawField();
        updateUI();
        return; // 雙殺打結束
    } 
    
    // == 4. 全壘打 ==
    if (result === "全壘打") {
        currentStats.hr++;
        if(isAICheck) { gameState.hitsAway++; gameState.abAway++; } else { gameState.hitsHome++; gameState.abHome++; }
        runs = (gameState.bases[0]?1:0) + (gameState.bases[1]?1:0) + (gameState.bases[2]?1:0) + 1;
        gameState.bases = [false, false, false];
        gameState.balls = 0; gameState.strikes = 0;
    } 
    
    // == 5. 嚴格定義的安打上壘邏輯 ==
    else if (result === "一壘安打" || result === "二壘安打" || result === "三壘安打") {
        let numBases = 1;
        if(result === "二壘安打") { numBases = 2; currentStats.double++; }
        if(result === "三壘安打") { numBases = 3; currentStats.triple++; }

        if(isAICheck) { gameState.hitsAway++; gameState.abAway++; } else { gameState.hitsHome++; gameState.abHome++; }

        let currentBases = [...gameState.bases];
        for (let b = 0; b < numBases; b++) {
            if (currentBases[2]) { runs++; }
            currentBases[2] = currentBases[1]; 
            currentBases[1] = currentBases[0]; 
            currentBases[0] = false;            
        }
        currentBases[numBases - 1] = true; // 只有這三個安打結果可以上壘！
        gameState.bases = currentBases;
        gameState.balls = 0; gameState.strikes = 0;
    }

    // == 6. 得分結算與 UI 更新 ==
    if (runs > 0) {
        if (isAICheck) gameState.scoreAway[gameState.inning-1] += runs;
        else gameState.scoreHome[gameState.inning-1] += runs;
    }
    drawField();
    updateUI();
}

function checkInningStatus() {
            if (gameState.outs >= 3 || gameState.isWalkOff) {
                document.getElementById('interactive-area').innerHTML = "";
                document.getElementById('next-half-btn').style.display = "inline-block";
                
                // 💡 計算分數確認是否為最後一局完賽
                let totalAway = gameState.scoreAway.reduce((a, b) => (a||0) + (b||0), 0);
                let totalHome = gameState.scoreHome.reduce((a, b) => (a||0) + (b||0), 0);
                
                const cond9TopWin = (gameState.inning === 9 && gameState.isTop && totalHome > totalAway);
                const cond9BottomEnd = (gameState.inning >= 9 && !gameState.isTop && totalHome !== totalAway);
                const cond12End = (gameState.inning === 12 && !gameState.isTop);

                if (cond9TopWin || cond9BottomEnd || cond12End || gameState.isWalkOff) {
                    document.getElementById('next-half-btn').innerText = "🏁 點擊查看比賽結果";
                } else {
                    document.getElementById('next-half-btn').innerText = gameState.isTop ? "三人出局！換玩家進攻打擊" : "三人出局！進入下一局";
                }
            }
        }

        function startNextHalf() {
            // 先計算目前總分，供後續判定使用
            let totalAway = gameState.scoreAway.reduce((a, b) => (a||0) + (b||0), 0);
            let totalHome = gameState.scoreHome.reduce((a, b) => (a||0) + (b||0), 0);

            // 💡 檢查是否已經觸發再見勝利，或者是滿足其他完賽條件
            const cond9TopWin = (gameState.inning === 9 && gameState.isTop && totalHome > totalAway);
            const cond9BottomEnd = (gameState.inning >= 9 && !gameState.isTop && totalHome !== totalAway);
            const cond12End = (gameState.inning === 12 && !gameState.isTop);

            if (gameState.isWalkOff || cond9TopWin || cond9BottomEnd || cond12End) {
                endGame();
                return;
            }

            document.getElementById('next-half-btn').style.display = "none";
            
            // 💡 判斷下一局/半局是否需要採用突破僵局制 (10局起二壘有人)
            let nextInning = gameState.inning;
            let nextIsTop = !gameState.isTop;
            if (!gameState.isTop) {
                nextInning++; // 如果是下半局結束，局數要加 1
            }

            if (nextInning >= 10) {
                gameState.bases = [false, true, false]; // 突破僵局制：二壘有人
            } else {
                gameState.bases = [false, false, false]; // 正常開局壘包全空
            }
            
            gameState.outs = 0; gameState.balls = 0; gameState.strikes = 0;

            if (gameState.isTop) {
                // ---- 【上半局結束，準備進入下半局】 ----
                gameState.isTop = false;
                if (gameState.scoreHome[gameState.inning-1] === null) {
                    gameState.scoreHome[gameState.inning-1] = 0;
                }
                
                let tieBreakText = gameState.inning >= 10 ? "（⚠️ 突破僵局制，二壘有人！）" : "";
                document.getElementById('game-log').innerText = `第 ${gameState.inning} 局下半${tieBreakText}，戴上打擊頭盔，看清 AI 的球路！`;
            } else {
                // ---- 【下半局結束，準備進入下一局上半】 ----
                gameState.inning++;
                gameState.isTop = true;
                if (gameState.scoreAway[gameState.inning-1] === null) {
                    gameState.scoreAway[gameState.inning-1] = 0;
                }
                
                let tieBreakText = gameState.inning >= 10 ? "（⚠️ 突破僵局制，二壘有人！）" : "";
                document.getElementById('game-log').innerText = `進入第 ${gameState.inning} 局上半${tieBreakText}！站上投手丘全力防守。`;
            }
            
            renderControlPanel();
            drawField();
            updateUI();
        }

        function endGame() {
            gameState.gameOver = true;
            updateUI();
            let totalAway = gameState.scoreAway.reduce((a, b) => (a||0) + (b||0), 0);
            let totalHome = gameState.scoreHome.reduce((a, b) => (a||0) + (b||0), 0);
            
            let avgHome = gameState.abHome > 0 ? (gameState.hitsHome / gameState.abHome).toFixed(3) : ".000";
            let avgAway = gameState.abAway > 0 ? (gameState.hitsAway / gameState.abAway).toFixed(3) : ".000";

            // 判斷最後顯示的勝負標題
            let resultText = "";
            if (totalHome > totalAway) {
                if (gameState.isWalkOff) {
                    resultText = `🏁 終場結束！玩家擊出再見得分，以 ${totalHome}X-${totalAway} 贏得勝利！🏆`;
                } else {
                    resultText = `🏁 終場結束！玩家以 ${totalHome}-${totalAway} 贏得勝利！🏆`;
                }
            } else if (totalAway > totalHome) {
                resultText = `🏁 終場結束！AI 以 ${totalAway}-${totalHome} 險勝。😭`;
            } else {
                resultText = `🏁 終場結束！鏖戰 12 局未分勝負，兩隊以 ${totalHome}-${totalAway} 握手言和！🤝`;
            }
            
            let statsHtml = `
                <br><br>📊 <b>【本場真實數據統計】</b><br>
                ───────────────<br>
                🔵 <b>主隊 (玩家)：</b><br>
                📈 打擊率 (AVG)：<b>${avgHome}</b> (${gameState.hitsHome}安打 / ${gameState.abHome}打數)<br>
                🔹 二壘安打：${gameState.stats.home.double} 次<br>
                🔹 三壘安打：${gameState.stats.home.triple} 次<br>
                🚀 全壘打：${gameState.stats.home.hr} 支<br>
                ───────────────<br>
                🔴 <b>客隊 (AI)：</b><br>
                📈 打擊率 (AVG)：<b>${avgAway}</b> (${gameState.hitsAway}安打 / ${gameState.abAway}打數)<br>
                🔹 二壘安打：${gameState.stats.away.double} 次<br>
                🔹 三壘安打：${gameState.stats.away.triple} 次<br>
                🚀 全壘打：${gameState.stats.away.hr} 支
            `;
            
            document.getElementById('game-log').innerHTML = resultText + statsHtml;
            document.getElementById('turn-title').innerText = "🏁 比賽結束";
            document.getElementById('interactive-area').innerHTML = "";
            
            document.getElementById('restart-game-btn').style.display = "inline-block";
        }

        function resetWholeGame() {
            document.getElementById('restart-game-btn').style.display = "none";
            initGameStateObject();
            // 💡 記得重置再見狀態
            gameState.isWalkOff = false; 
            drawField();
            renderControlPanel();
            updateUI();
            document.getElementById('game-log').innerText = "全新比賽開始！點擊按鈕投出第一球！";
        }

        function initGame() {
            initGameStateObject();
            gameState.isWalkOff = false;
            drawField();
            renderControlPanel();
            updateUI();
        }
        initGame();
    </script>
</body>
</html>
